# Trippy static-site config for the Docker runtime stage.
#
# Two non-obvious requirements:
#
#  1. **Cross-origin isolation.** Browsers gate `SharedArrayBuffer` behind
#     the COOP+COEP+CORP triple. The audio engine writes rendered frames
#     into an SAB ring buffer that the AudioWorklet drains, so missing any
#     one of these headers silently breaks playback.
#
#  2. **Correct .wasm MIME type.** Streaming WebAssembly instantiation
#     (`WebAssembly.instantiateStreaming`) refuses anything other than
#     `application/wasm`. nginx 1.21+ ships the right default but we set
#     it explicitly so older base images still work.

server {
    listen       8080 default_server;
    listen       [::]:8080 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # MIME-type overrides on top of the included /etc/nginx/mime.types.
    # nginx's defaults already cover html/css/png/svg/json/wasm/woff2 — we
    # only need to add the few they miss or remap.
    types {
        application/manifest+json   webmanifest;
        text/javascript             js mjs;
    }
    default_type application/octet-stream;

    # ─── Cross-origin isolation (required for SharedArrayBuffer) ───
    # Applied to every response via the named map below.
    add_header Cross-Origin-Opener-Policy   "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Light hardening on top of isolation.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ─── Compression ───
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/html
        text/javascript
        application/javascript
        application/json
        application/wasm
        application/manifest+json
        image/svg+xml
        font/woff2;

    # ─── Caching strategy ───
    # Vite emits hashed asset filenames (index-XXXX.js, trippy_engine_bg-XXXX.wasm),
    # so /assets/* is immutable and safe to cache for a year.
    location ^~ /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Cross-Origin-Opener-Policy   "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        try_files $uri =404;
    }

    # The service worker and entry HTML must never be cached — they're how
    # clients discover the new hashed asset names.
    location = /sw.js {
        add_header Cache-Control "no-cache" always;
        add_header Cross-Origin-Opener-Policy   "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        try_files $uri =404;
    }

    location = /registerSW.js {
        add_header Cache-Control "no-cache" always;
        add_header Cross-Origin-Opener-Policy   "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache" always;
        add_header Content-Type "application/manifest+json" always;
        add_header Cross-Origin-Opener-Policy   "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache" always;
        add_header Cross-Origin-Opener-Policy   "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # ─── SPA fallback ───
    # Anything else falls back to index.html so client-side routing works.
    location / {
        add_header Cache-Control "no-cache" always;
        add_header Cross-Origin-Opener-Policy   "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        try_files $uri $uri/ /index.html;
    }

    # Disable directory listing entirely.
    autoindex off;
}
